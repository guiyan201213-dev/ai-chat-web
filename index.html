<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chat Pro | 我的智能助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <span class="sparkle">✨</span> AI Chat Pro
            </div>
            <div class="model-selector">
                <select id="model-select">
                    <option value="tencent/Hunyuan-MT-7B">Hunyuan-MT</option>
                    <option value="deepseek-ai/DeepSeek-R1-0528-Qwen3-8B">DeepSeek-R1-0528</option>
                    <option value="Qwen/Qwen3-8B">Qwen3</option>
                </select>
            </div>
        </header>

        <main class="chat-box" id="chat-box">
            <div class="message ai-message">
                <div class="avatar">🤖</div>
                <div class="bubble">
                    你好！我已经接入了硅基流动大模型矩阵，请问今天想聊点什么？
                </div>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="输入你的问题，按 Enter 发送..." rows="1"></textarea>
                <button id="send-btn" class="send-btn" title="发送">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="footer-text">AI 可能会生成不准确的信息，请注意核实。</div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
