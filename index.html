<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Go</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="initial-state">
    <div class="bg-layer"></div>

    <div class="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <button id="new-chat-btn" class="main-btn">＋ 开启新对话</button>
                <div class="auth-box">
                    <button id="login-btn" class="auth-btn">GitHub 登录</button>
                    <div id="user-info" class="user-card" style="display: none;">
                        <img id="user-avatar" src="" alt="">
                        <span id="user-name"></span>
                        <button id="logout-btn">退出</button>
                    </div>
                </div>
            </div>
            <div class="history-container" id="history-list">
                <div class="section-label">历史记录</div>
            </div>
        </aside>

        <main class="main-body">
            <button id="menu-btn" class="mobile-menu-trigger">☰</button>
            
            <div class="chat-viewport">
                <div id="welcome-hero" class="welcome-screen">
                    <h1>Chat Go</h1>
                    <p>今天想聊点什么？</p>
                </div>
                <div id="chat-box" class="messages-area"></div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="给 Chat Go 发送消息..." rows="1"></textarea>
                    <div class="input-tools">
                        <div class="model-picker">
                            <button id="model-toggle" class="tool-btn">✨ <span id="model-text">DeepSeek-R1</span></button>
                            <div id="model-menu" class="dropdown-menu">
                                <div class="model-item active" data-id="deepseek-ai/DeepSeek-R1-0528-Qwen3-8B"><b>DeepSeek-R1</b><small>深度推理模型</small></div>
                                <div class="model-item" data-id="tencent/Hunyuan-MT-7B"><b>Hunyuan</b><small>通用平衡模型</small></div>
                                <div class="model-item" data-id="Qwen/Qwen3-8B"><b>Qwen3</b><small>极速响应模型</small></div>
                            </div>
                        </div>
                        <button id="send-btn" class="send-action-btn">
                            <span class="ico-send">↑</span>
                            <div class="loader-ring"></div>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
