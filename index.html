<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Go</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="top-brand-name">Chat Go</div>

    <div class="app-layout">
        <aside class="sidebar glass-panel" id="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="glass-btn new-chat-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    开启新对话
                </button>
                <button id="close-sidebar-btn" class="icon-btn close-btn mobile-only">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="user-auth-section" id="user-section">
                <button id="login-btn" class="glass-btn auth-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"/></svg>
                    GitHub 登录
                </button>
                <div id="user-info" class="user-info-panel glass-panel" style="display: none;">
                    <img id="user-avatar" src="" alt="avatar">
                    <span id="user-name">加载中...</span>
                    <button id="logout-btn" title="退出">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                    </button>
                </div>
            </div>

            <div class="history-list" id="history-list">
                <div class="history-title">历史记录</div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <button id="menu-btn" class="icon-btn mobile-only glass-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
            </header>

            <div class="chat-wrapper">
                <div class="hero-greeting" id="hero-greeting">
                    <h1>有什么我可以帮您的？</h1>
                    <p>随时向我提问，或让我帮您写点什么。</p>
                </div>
                
                <div class="chat-container" id="chat-box"></div>
                <div class="bottom-gradient"></div>
                
                <div class="input-area">
                    <div class="input-pill glass-panel">
                        <textarea id="user-input" placeholder="输入你想聊的内容..." rows="1"></textarea>
                        
                        <div class="action-row">
                            <div class="custom-model-selector" id="custom-model-selector">
                                <button class="model-toggle glass-btn" id="model-toggle">
                                    <span class="sparkle">✨</span>
                                    <span id="current-model-name" class="model-name-text">DeepSeek-R1</span>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                </button>
                                
                                <div class="model-menu glass-panel" id="model-menu">
                                    <div class="model-option active" data-value="deepseek-ai/DeepSeek-R1-0528-Qwen3-8B">
                                        <div class="opt-title">DeepSeek-R1</div>
                                        <div class="opt-desc">深度思考，擅长复杂逻辑推理与代码生成</div>
                                    </div>
                                    <div class="model-option" data-value="tencent/Hunyuan-MT-7B">
                                        <div class="opt-title">Hunyuan (混元)</div>
                                        <div class="opt-desc">腾讯旗舰，全面均衡的通用大语言模型</div>
                                    </div>
                                    <div class="model-option" data-value="Qwen/Qwen3-8B">
                                        <div class="opt-title">Qwen3 (千问)</div>
                                        <div class="opt-desc">阿里开源顶流，极速响应，日常问答首选</div>
                                    </div>
                                </div>
                            </div>

                            <button id="send-btn" class="send-btn">
                                <span class="send-icon"><svg viewBox="0 0 24 24" width="20" height="20" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg></span>
                                <span class="stop-icon" style="display: none;"><svg viewBox="0 0 24 24" width="16" height="16" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12"></rect></svg></span>
                                <div class="spinner-ring"></div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
