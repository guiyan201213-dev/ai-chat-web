<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 智能助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="pill-btn new-chat-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    开启新对话
                </button>
                <button id="close-sidebar-btn" class="icon-btn close-btn mobile-only">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="history-list" id="history-list">
                <div class="history-title">历史对话记录</div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <button id="menu-btn" class="icon-btn mobile-only">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="model-selector pill-shape">
                    <span class="sparkle">✨</span>
                    <select id="model-select">
                        <option value="deepseek-ai/DeepSeek-R1-0528-Qwen3-8B">DeepSeek-R1</option>
                        <option value="tencent/Hunyuan-MT-7B">Hunyuan-MT</option>
                        <option value="Qwen/Qwen3-8B">Qwen3</option>
                    </select>
                </div>
            </header>

            <div class="chat-wrapper">
                <div class="hero-greeting" id="hero-greeting">
                    <h1>有什么我可以帮您的？</h1>
                    <p>随时向我提问，或让我帮您写点什么。</p>
                </div>
                
                <div class="chat-container" id="chat-box"></div>
                
                <div class="bottom-gradient"></div>
                
                <div class="input-area">
                    <div class="input-pill">
                        <textarea id="user-input" placeholder="输入你想聊的内容..." rows="1"></textarea>
                        <button id="send-btn" class="send-btn">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="19" x2="12" y2="5"></line>
                                <polyline points="5 12 12 5 19 12"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
